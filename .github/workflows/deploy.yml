# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml
# QuantBengal Pro SMC Terminal — Deployment Pipeline
#
# Triggers : push to main branch ONLY (after PR is merged)
#            + manual trigger via workflow_dispatch
#
# Fix log (vs previous version):
#   • All action pins bumped to Node.js 24-compatible releases:
#       actions/checkout            v4  → v4.2.2
#       actions/setup-python        v5  → v5.6.0
#       docker/setup-buildx-action  v3  → v3.10.0
#       docker/login-action         v3  → v3.4.0
#       docker/metadata-action      v5  → v5.7.0
#       docker/build-push-action    v6  → v6.15.0
#   • Added DOCKER_BUILDKIT=1 env on docker-publish job
#   • deploy-summary: variables inside heredoc now use bash $VAR substitution
#     instead of ${{ }} expressions — GHA does not expand context expressions
#     inside heredoc bodies, which caused blank fields in the summary table.
#
# ─────────────────────────────────────────────────────────────────────────────
#
# Deployment options:
#
#   A. Streamlit Community Cloud — connect repo at share.streamlit.io
#      No extra Actions config needed. ci.yml is your quality gate.
#      Set Main file = app.py, branch = main.
#
#   B. GHCR Docker image — automated by this workflow.
#      Pull with: docker pull ghcr.io/<owner>/<repo>:latest
#
#   C. Railway  — uncomment the railway-deploy job, add RAILWAY_TOKEN secret
#   D. Render   — uncomment render-deploy job, add RENDER_DEPLOY_HOOK_URL secret
#
# SECRETS NEEDED:
#   GHCR push  : GITHUB_TOKEN (auto-provided — no setup needed)
#   Railway    : RAILWAY_TOKEN
#   Render     : RENDER_DEPLOY_HOOK_URL
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy — Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel an in-flight deploy — let it finish cleanly
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Validation gate — must pass before any image is built ────────────
  pre-deploy-validate:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2          # Node.js 24 runner ✓

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5.6.0      # Node.js 24 runner ✓
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full validation gate
        run: |
          python - << 'PYCHECK'
          import ast, sys

          with open("app.py") as f:
              src = f.read()

          try:
              tree = ast.parse(src)
          except SyntaxError as e:
              print(f"[BLOCK] SyntaxError — deployment blocked: {e}")
              sys.exit(1)

          required_fns = [
              "fetch_ohlcv", "compute_smc_signals", "build_chart",
              "build_kpi_html", "build_signal_table",
              "run_backtest", "compute_bt_stats",
              "build_equity_curve_timeseries", "build_result_donut",
              "render_radar_banner", "render_radar_metrics",
          ]
          defined = {n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)}
          missing = [f for f in required_fns if f not in defined]
          if missing:
              print(f"[BLOCK] Missing functions — deployment blocked: {missing}")
              sys.exit(1)

          tabs = [n for n in ast.walk(tree)
                  if isinstance(n, ast.Call) and hasattr(n, "func")
                  and isinstance(n.func, ast.Attribute) and n.func.attr == "tabs"]
          if len(tabs) != 1:
              print(f"[BLOCK] {len(tabs)} st.tabs() calls — duplicate tab block detected")
              sys.exit(1)

          print(f"[PASS] app.py validated — {len(src.splitlines())} lines, "
                f"{len(required_fns)} functions confirmed, single tab block OK")
          PYCHECK

  # ── Job 2: Build and push Docker image to GHCR ─────────────────────────────
  docker-publish:
    name: Build & Push Docker Image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: pre-deploy-validate

    permissions:
      contents: read
      packages: write            # required to push to ghcr.io

    env:
      DOCKER_BUILDKIT: "1"       # required for GHA cache driver

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags:   ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2          # Node.js 24 runner ✓

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0   # Node.js 24 runner ✓

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0       # Node.js 24 runner ✓
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags generated:
      #   latest        — always the current main build
      #   sha-<short>   — immutable, use for rollback
      #   YYYY-MM-DD    — date audit trail
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.7.0    # Node.js 24 runner ✓
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=schedule,pattern={{date 'YYYY-MM-DD'}}
          labels: |
            org.opencontainers.image.title=QuantBengal Pro SMC Terminal
            org.opencontainers.image.description=Smart Money Concepts Liquidity Sweep Detection Terminal
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@v6.15.0 # Node.js 24 runner ✓
        with:
          context: .
          push: true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64   # amd64=VPS, arm64=Fly.io/Apple M-series
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Print published image details
        run: |
          echo "=============================================="
          echo "  GHCR image published successfully"
          echo "  Digest : ${{ steps.build.outputs.digest }}"
          echo "=============================================="
          echo ""
          echo "  Pull and run:"
          echo "  docker pull ${{ env.IMAGE_NAME }}:latest"
          echo "  docker run -p 8501:8501 ${{ env.IMAGE_NAME }}:latest"

  # ── Job 3: Railway deployment (OPTIONAL) ───────────────────────────────────
  # Uncomment to enable. Requires RAILWAY_TOKEN in repo Secrets.
  #
  # railway-deploy:
  #   name: Deploy to Railway
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 10
  #   needs: docker-publish
  #
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4.2.2
  #
  #     - name: Install Railway CLI
  #       run: npm install -g @railway/cli
  #
  #     - name: Deploy to Railway
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  #       run: |
  #         railway up --service quantbengal-smc --detach
  #         echo "Railway deployment triggered"

  # ── Job 4: Render deployment (OPTIONAL) ────────────────────────────────────
  # Uncomment to enable. Requires RENDER_DEPLOY_HOOK_URL in repo Secrets.
  #
  # render-deploy:
  #   name: Trigger Render Deploy Hook
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 5
  #   needs: docker-publish
  #
  #   steps:
  #     - name: Trigger Render redeploy
  #       run: |
  #         curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
  #           -H "Content-Type: application/json" \
  #           --fail-with-body
  #         echo "Render deploy hook triggered"

  # ── Job 5: Post-deploy summary ─────────────────────────────────────────────
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: docker-publish
    if: always()

    steps:
      # Fix: ${{ }} expressions don't expand inside heredoc bodies in GHA.
      # Export values to bash env vars first, then reference with $VAR.
      - name: Write job summary
        env:
          COMMIT_SHA:   ${{ github.sha }}
          ACTOR:        ${{ github.actor }}
          IMAGE:        ${{ needs.docker-publish.outputs.image-tags }}
          BUILD_STATUS: ${{ needs.docker-publish.result }}
          IMAGE_NAME:   ${{ env.IMAGE_NAME }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## QuantBengal Pro SMC Terminal — Deployment Summary

          | Item | Value |
          |---|---|
          | **Trigger** | Push to \`main\` |
          | **Commit** | \`${COMMIT_SHA}\` |
          | **Actor** | \`${ACTOR}\` |
          | **Image** | \`${IMAGE_NAME}:latest\` |
          | **Status** | ${BUILD_STATUS} |

          ### Pull and run

          \`\`\`bash
          docker pull ${IMAGE_NAME}:latest
          docker run -p 8501:8501 ${IMAGE_NAME}:latest
          # Open: http://localhost:8501
          \`\`\`

          ### Rollback to this exact commit

          \`\`\`bash
          docker pull ${IMAGE_NAME}:sha-${COMMIT_SHA:0:7}
          docker run -p 8501:8501 ${IMAGE_NAME}:sha-${COMMIT_SHA:0:7}
          \`\`\`

          ### Streamlit Community Cloud
          Connected at [share.streamlit.io](https://share.streamlit.io)?
          It auto-deploys from \`main\` within ~2 minutes of this push.
          No further action needed.
          SUMMARY
