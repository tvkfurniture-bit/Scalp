# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# QuantBengal Pro SMC Terminal — Continuous Integration
#
# Triggers : every push to any branch + every pull request targeting main
# Purpose  : catch syntax errors, broken imports, and obvious regressions
#            BEFORE they reach the deployment branch
#
# Fix log (vs previous version):
#   • All action pins bumped to Node.js 24-compatible releases to silence
#     the "Node.js 20 deprecated as of June 16 2026" runner warnings:
#       actions/checkout          v4  → v4.2.2
#       actions/setup-python      v5  → v5.6.0
#       docker/setup-buildx-action v3 → v3.10.0
#       docker/build-push-action  v6  → v6.15.0
#   • docker-build job: removed multi-platform (linux/amd64,linux/arm64)
#     from the CI test build — QEMU cross-compilation is only needed on
#     the final push; doing it in CI doubles build time for no gain.
#   • Added explicit DOCKER_BUILDKIT=1 env so the GHA cache driver works
#     correctly on ubuntu-latest runners.
#   • concurrency cancel-in-progress: true is intentional — the "cancelled"
#     run #1 you saw in the Actions UI is correct behaviour, not an error.
#     When you push twice quickly, the older run is superseded.
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Validate & Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel stale runs on the same branch when a newer commit is pushed.
# The "Cancelling since a higher priority waiting request exists" message
# you saw is this feature working as designed — not an error.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Python validation ────────────────────────────────────────────────
  validate:
    name: Python Syntax & Import Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2          # Node.js 24 runner ✓

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0      # Node.js 24 runner ✓
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── AST syntax parse ────────────────────────────────────────────────────
      - name: Parse app.py (AST syntax check)
        run: |
          python - << 'PYCHECK'
          import ast, sys

          with open("app.py") as f:
              src = f.read()

          try:
              tree = ast.parse(src)
              print(f"[OK] app.py parses cleanly ({len(src.splitlines())} lines)")
          except SyntaxError as e:
              print(f"[FAIL] SyntaxError in app.py: {e}")
              sys.exit(1)

          defined = {n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)}
          required = [
              "fetch_ohlcv", "compute_smc_signals", "build_chart",
              "build_kpi_html", "build_signal_table",
              "run_backtest", "compute_bt_stats",
              "build_equity_curve_timeseries", "build_result_donut",
              "render_radar_banner", "render_radar_metrics",
          ]
          missing = [f for f in required if f not in defined]
          if missing:
              print(f"[FAIL] Missing functions: {missing}")
              sys.exit(1)
          print(f"[OK] All {len(required)} required functions present")

          for node in ast.walk(tree):
              if isinstance(node, ast.Call):
                  for kw in node.keywords:
                      if kw.arg == "threads":
                          print("[FAIL] threads= kwarg found — removed in yfinance 0.2.38")
                          sys.exit(1)
              if isinstance(node, ast.Attribute) and node.attr == "applymap":
                  print("[FAIL] .applymap() deprecated in pandas 2.1 — use .map()")
                  sys.exit(1)

          tabs_calls = [
              n for n in ast.walk(tree)
              if isinstance(n, ast.Call)
              and hasattr(n, "func")
              and isinstance(n.func, ast.Attribute)
              and n.func.attr == "tabs"
          ]
          if len(tabs_calls) != 1:
              print(f"[FAIL] Expected 1 st.tabs() call, found {len(tabs_calls)}")
              sys.exit(1)
          print("[OK] Single st.tabs() definition confirmed")
          print("[PASS] All validation checks passed")
          PYCHECK

      # ── Import resolution ───────────────────────────────────────────────────
      - name: Verify all imports resolve
        run: |
          python - << 'PYCHECK'
          import importlib, sys

          required_modules = [
              "streamlit", "pandas", "numpy", "yfinance",
              "plotly.graph_objects", "plotly.subplots",
          ]
          failed = []
          for mod in required_modules:
              try:
                  importlib.import_module(mod)
                  print(f"[OK] {mod}")
              except ImportError as e:
                  print(f"[FAIL] {mod}: {e}")
                  failed.append(mod)

          if failed:
              print(f"\nFailed imports: {failed}")
              sys.exit(1)
          print("\n[PASS] All imports resolve correctly")
          PYCHECK

      # ── requirements.txt completeness ───────────────────────────────────────
      - name: Verify requirements.txt contains all packages
        run: |
          python - << 'PYCHECK'
          with open("requirements.txt") as f:
              content = f.read().lower()
          required_pkgs = ["streamlit", "yfinance", "pandas", "numpy", "plotly"]
          missing = [p for p in required_pkgs if p not in content]
          if missing:
              print(f"[FAIL] Missing from requirements.txt: {missing}")
              exit(1)
          print("[PASS] requirements.txt contains all required packages")
          PYCHECK

      # ── Streamlit config present ─────────────────────────────────────────────
      - name: Check .streamlit/config.toml exists
        run: |
          if [ -f ".streamlit/config.toml" ]; then
            echo "[OK] .streamlit/config.toml present"
          else
            echo "[WARN] .streamlit/config.toml missing — headless deploy may block on email prompt"
          fi

  # ── Job 2: Docker build test (no push) ─────────────────────────────────────
  docker-build:
    name: Docker Build Test (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    env:
      DOCKER_BUILDKIT: "1"       # required for GHA cache driver on ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2          # Node.js 24 runner ✓

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0   # Node.js 24 runner ✓

      - name: Build Docker image (no push, amd64 only for speed)
        uses: docker/build-push-action@v6.15.0     # Node.js 24 runner ✓
        with:
          context: .
          push: false
          tags: quantbengal-smc:ci-test
          platforms: linux/amd64   # single platform in CI — cross-compile only on deploy
          cache-from: type=gha
          cache-to: type=gha,mode=max
